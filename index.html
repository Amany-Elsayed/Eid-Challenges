<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تحديات العيد</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>

<body>

<canvas id="confetti"></canvas>
<canvas id="fireworks-bg"></canvas>

<div class="sky">
  <div class="moon"></div>
  <div class="stars"></div>
</div>

<!-- Hanging Eid Decorations -->
<div class="garland-container">
  <svg class="garland-wire" viewBox="0 0 1000 200" preserveAspectRatio="xMidYMid meet">
    <path id="garland-path" d="M0 -20 Q500 220 1000 -20" />
  </svg>

  <div class="lantern l1"></div>
  <div class="lantern l2"></div>
  <div class="lantern l3"></div>
  <div class="lantern l4"></div>
  <div class="lantern l5"></div>
  <div class="lantern l6"></div>
  <div class="lantern l7"></div>
</div>

<div class="town-bg"></div>

<header>
  <h1>عيد مبارك</h1>

  <div class="quote-box" id="quoteBox">
    <p id="dailyQuote"></p>

    <div class="share-buttons">
      <button id="shareTextBtn">مشاركة كنص</button>
      <button id="shareImageBtn">مشاركة كصورة</button>
    </div>
  </div>

  <p id="progressText"></p>
  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</header>

<section class="calendar" id="calendar"></section>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2>تحدي اليوم</h2>
    <p id="challengeText"></p>
    <button id="completeBtn">تم الإنجاز</button>
    <button class="close-btn" onclick="closeModal()">إغلاق</button>
  </div>
</div>

<div class="modal" id="congratsModal">
  <div class="modal-content" id="congratsCard">
    <h2>مبارك لك إتمام جميع التحديات</h2>
    <p class="gift-text">اليك هديتك يمكنك تحميلها او مشاركتها</p>
    <img src="assets/congrats.png" class="congrats-img">

    <div class="share-buttons">
      <button id="downloadCongrats">تحميل الصورة</button>
      <button id="shareCongrats">مشاركة الصورة</button>
    </div>

    <button class="close-btn" onclick="closeCongrats()">إغلاق</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
