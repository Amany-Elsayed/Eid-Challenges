<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>تحديات العيد</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  </head>

  <body>
    <div id="bg-fixed"></div>
    <canvas id="bg-fireworks"></canvas>
    <canvas
      id="confetti"
      style="position: fixed; inset: 0; pointer-events: none; z-index: -1"
    ></canvas>

    <div class="garland-wrapper">
      <svg
        class="garland-svg"
        id="garland-svg"
        viewBox="0 0 1000 320"
        preserveAspectRatio="xMidYMin slice"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          class="garland-stroke"
          d="M9,14 C9,14 2,9 2,5 a3.5,3.5 0 0 1 7,0 a3.5,3.5 0 0 1 7,0 c0,4 -5,9 -7,9 z"
          transform="translate(11,0)"
          style="fill: #888"
        />
        <path
          class="garland-stroke"
          d="M9,14 C9,14 2,9 2,5 a3.5,3.5 0 0 1 7,0 a3.5,3.5 0 0 1 7,0 c0,4 -5,9 -7,9 z"
          transform="translate(971,0)"
          style="fill: #888"
        />

        <path class="garland-stroke" d="M 20,2 Q 500,200 980,2" fill="none" />

        <g id="garland-flags"></g>
      </svg>
    </div>

    <div class="town-bg"></div>

    <header>
      <h1>عيد مبارك</h1>

      <div class="quote-box" id="quoteBox">
        <p id="dailyQuote"></p>

        <div class="share-buttons">
          <button id="shareTextBtn">مشاركة كنص</button>
          <button id="shareImageBtn">مشاركة كصورة</button>
        </div>
      </div>

      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <p id="progressText"></p>
    </header>

    <section class="calendar" id="calendar"></section>

    <div class="modal" id="modal">
      <div class="modal-content">
        <h2>تحدي اليوم</h2>
        <p id="challengeText"></p>
        <button id="completeBtn">تم الإنجاز</button>
        <button class="close-btn" onclick="closeModal()">إغلاق</button>
      </div>
    </div>

    <div class="modal" id="congratsModal">
      <canvas id="fireworks"></canvas>

      <div class="modal-content" id="congratsCard">
        <h2>مبارك لك إتمام جميع التحديات</h2>
        <p class="gift-text">اليك هديتك يمكنك تحميلها او مشاركتها</p>

        <img src="assets/congrats.png" class="congrats-img" />

        <div class="share-buttons">
          <button id="downloadCongrats">تحميل الصورة</button>
          <button id="shareCongrats">مشاركة الصورة</button>
        </div>

        <button class="close-btn" onclick="closeCongrats()">إغلاق</button>
      </div>
    </div>

    <footer>【=︿=】</footer>

    <script src="script.js"></script>
  </body>
</html>
